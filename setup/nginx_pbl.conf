# Конфигурационный файл виртуального хоста Nginx
# Пример настройки прокси-сервера для развертывания веб-панели

server {
    listen 80;
    server_name cdr-panel.yourcompany.ru; # Укажите ваш домен

    # Логирование
    access_log /var/log/nginx/asterisk-cdr-panel_access.log;
    error_log /var/log/nginx/asterisk-cdr-panel_error.log;

    # Максимальный размер загружаемого кэша или файлов
    client_max_body_size 50M;

    # Основной веб-интерфейс и API (проксирование на Express-сервер Node.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    # Раздача аудиофайлов записей разговоров напрямую силами Nginx (Вариант Б)
    location /asterisk-monitor/ {
        alias /var/spool/asterisk/monitor/;
        autoindex off;
        
        # Настройка заголовков кэширования для аудиозаписей (.wav, .mp3, .ogg)
        expires 30d;
        add_header Cache-Control "public, no-transform";

        # Поддержка докачки файлов в плеере (Range requests)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Разрешение CORS для безопасного воспроизведения внутри iframe или плеера
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range";

        # Безопасность: разрешаем доступ к записям только из внутренних подсетей
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }
}
