; Конфигурационный файл Asterisk Manager Interface (AMI)
; Скопируйте содержимое данного блока в конец файла /etc/asterisk/manager.conf 
; или добавьте его в подключаемый файл /etc/asterisk/manager_custom.conf в FreePBX

[clicktocall]
enabled = yes
secret = your_secure_ami_password_here
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255 ; Разрешить подключение локально (веб-панель на том же сервере)
; permit = 192.168.1.50/255.255.255.255 ; Расскомментируйте и впишите IP сервера панели, если бэкенд на другом хосте

; Разрешения на чтение/запись событий звонка и команд
read = system,call,user
write = system,call,originate
