; PBXPuls dynamic conference contexts.
; Include these contexts from /etc/asterisk/extensions_custom.conf.

[pbxpuls-conference]
exten => _X!,1,NoOp(PBXPuls active call conference ${EXTEN})
 same => n,Set(__PBXPULS_CONFERENCE_ID=${EXTEN})
 same => n,ConfBridge(${EXTEN})
 same => n,Hangup()

[pbxpuls-conference-initiator]
exten => _X!,1,NoOp(PBXPuls conference initiator ${EXTEN})
 same => n,Set(__PBXPULS_CONFERENCE_ID=${EXTEN})
 same => n,Set(CONFBRIDGE(user,marked)=yes)
 same => n,ConfBridge(${EXTEN})
 same => n,Hangup()

[pbxpuls-conference-participant]
exten => _X!,1,NoOp(PBXPuls conference participant ${EXTEN})
 same => n,Set(__PBXPULS_CONFERENCE_ID=${EXTEN})
 same => n,Set(CONFBRIDGE(user,end_marked)=yes)
 same => n,ConfBridge(${EXTEN})
 same => n,Hangup()
