<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Контроль пропущенных звонков FreePBX CDR</title>
    <script>
      (function() {
        window.addEventListener('error', function(e) {
          showOverlay(e.message + ' (at ' + e.filename + ':' + e.lineno + ':' + e.colno + ')', e.error);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason;
          var msg = reason ? (reason.message || reason) : 'Unknown reason';
          showOverlay('Unhandled Rejection: ' + msg, reason);
        });

        function showOverlay(msg, err) {
          var div = document.getElementById('startup-error-overlay');
          if (!div) {
            div = document.createElement('div');
            div.id = 'startup-error-overlay';
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.height = '100%';
            div.style.backgroundColor = '#1e293b';
            div.style.color = '#f87171';
            div.style.padding = '32px';
            div.style.zIndex = '999999';
            div.style.fontFamily = 'monospace';
            div.style.overflow = 'auto';
            div.style.boxSizing = 'border-box';
            
            var header = document.createElement('h1');
            header.innerText = '⚠️ Критическая ошибка инициализации';
            header.style.fontSize = '24px';
            header.style.color = '#ef4444';
            header.style.margin = '0 0 16px 0';
            div.appendChild(header);
            
            var desc = document.createElement('p');
            desc.innerText = 'Обнаружена ошибка до запуска React-компонентов. Подробности ниже:';
            desc.style.color = '#cbd5e1';
            desc.style.fontSize = '14px';
            desc.style.margin = '0 0 24px 0';
            div.appendChild(desc);
            
            document.body.appendChild(div);
          }
          
          var pre = document.createElement('pre');
          pre.style.backgroundColor = '#0f172a';
          pre.style.border = '1px solid #334155';
          pre.style.padding = '16px';
          pre.style.borderRadius = '8px';
          pre.style.fontSize = '13px';
          pre.style.color = '#f87171';
          pre.style.whiteSpace = 'pre-wrap';
          pre.style.wordBreak = 'break-all';
          pre.style.lineHeight = '1.6';
          
          pre.innerText = msg + (err && err.stack ? '\n\nСтек вызовов:\n' + err.stack : '');
          div.appendChild(pre);
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased h-screen">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
